name: Refresh Products Snapshot

on:
  schedule:
    - cron: '5 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Refresh snapshot files
        run: node scripts/refresh-products-snapshot.mjs

      - name: Commit updated snapshot
        run: |
          if git diff --quiet -- src/app/api/[...path]/products-fallback.json src/app/api/[...path]/stats-fallback.json; then
            echo "No snapshot changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app/api/[...path]/products-fallback.json src/app/api/[...path]/stats-fallback.json
          git commit -m "Refresh products fallback snapshot"
          git push
